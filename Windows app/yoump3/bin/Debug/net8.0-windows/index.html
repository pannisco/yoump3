<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouMP3</title>
  <style>
    :root {
      --bg: #18181b;
      --card: #27272a;
      --border: #3f3f46;
      --accent: #e63946;
      --accent-hover: #c1121f;
      --green: #22c55e;
      --text: #f4f4f5;
      --sub: #a1a1aa;
      --mono: 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 500px;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.3px; }
    header span { color: var(--sub); font-size: .8rem; margin-left: auto; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--sub);
      margin-bottom: 14px;
    }

    /* Status */
    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--sub); flex-shrink: 0; transition: background .3s;
    }
    .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-label { font-size: .9rem; }
    .badge {
      margin-left: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: .75rem;
      color: var(--sub);
      font-family: var(--mono);
    }
    .progress-track {
      height: 4px; background: var(--bg); border-radius: 4px;
      overflow: hidden; margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      width: 0%; transition: width .5s;
    }
    .log-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .75rem;
      font-family: var(--mono);
      color: var(--sub);
      min-height: 40px;
      max-height: 90px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Input & buttons */
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 9px;
      font-size: .9rem;
      outline: none;
      margin-bottom: 9px;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--sub); }

    .btn {
      display: block; width: 100%;
      padding: 11px; border: none; border-radius: 9px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn + .btn { margin-top: 8px; }
    .btn-red   { background: var(--accent); color: #fff; }
    .btn-red:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--sub);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-green { background: #166534; color: #fff; }
    .btn-green:hover { background: #15803d; }

    /* File list */
    .files-header {
      display: flex; align-items: center; margin-bottom: 12px;
    }
    .files-header .card-title { margin-bottom: 0; }
    .file-count {
      margin-left: auto;
      font-size: .75rem; color: var(--sub);
    }
    .file-list { list-style: none; display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
    .file-item {
      display: flex; align-items: center;
      background: var(--bg); border-radius: 8px;
      padding: 8px 11px; gap: 8px;
    }
    .file-icon { font-size: 1rem; flex-shrink: 0; }
    .file-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: .82rem;
    }
    .file-size { color: var(--sub); font-size: .72rem; white-space: nowrap; }
    .dl-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: 4px 10px;
      font-size: .72rem; font-weight: 600; cursor: pointer;
      flex-shrink: 0; transition: background .15s;
    }
    .dl-btn:hover { background: var(--accent-hover); }
    .empty-state {
      text-align: center; color: var(--sub); font-size: .85rem; padding: 14px 0;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      background: #3f3f46; color: var(--text);
      padding: 10px 20px; border-radius: 10px;
      font-size: .85rem; pointer-events: none;
      opacity: 0; transition: opacity .25s;
      white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="13" fill="#e63946" opacity=".15"/>
    <circle cx="14" cy="14" r="13" stroke="#e63946" stroke-width="1.5"/>
    <polygon points="11,9 20,14 11,19" fill="#e63946"/>
  </svg>
  <h1>YouMP3</h1>
  <span id="serverAddr">—</span>
</header>

<!-- STATUS -->
<div class="card">
  <div class="card-title">Status</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-label" id="statusText">Connecting...</span>
    <span class="badge" id="progress">0/0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
  <div class="log-box" id="log">—</div>
</div>

<!-- DOWNLOAD -->
<div class="card">
  <div class="card-title">New Download</div>
  <input type="text" id="urlInput" placeholder="YouTube URL or playlist…">
  <input type="text" id="pathInput" placeholder="Download path (optional — uses app default)">
  <button class="btn btn-red" id="dlBtn">⬇&#xFE0E; Download</button>
  <button class="btn btn-ghost" id="stopBtn">✕ Stop current download</button>
</div>

<!-- FILES -->
<div class="card">
  <div class="files-header">
    <div class="card-title">Downloaded files</div>
    <span class="file-count" id="fileCount"></span>
  </div>
  <ul class="file-list" id="fileList">
    <li class="empty-state">Loading…</li>
  </ul>
  <button class="btn btn-green" id="zipBtn" style="margin-top:12px">📦 Download all as ZIP</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── helpers ────────────────────────────────────────────────────────────────
  function toast(msg, dur) {
    dur = dur || 2500;
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.classList.remove('show'); }, dur);
  }

  function apiFetch(endpoint, method, body) {
    method = method || 'GET';
    var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    return fetch(endpoint, opts).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  // ── server address in header ───────────────────────────────────────────────
  document.getElementById('serverAddr').textContent = window.location.host;

  // ── status polling ─────────────────────────────────────────────────────────
  function pollStatus() {
    apiFetch('/status').then(function(d) {
      var active = d.status === 'downloading';
      document.getElementById('dot').className = 'dot' + (active ? ' active' : '');
      document.getElementById('statusText').textContent = active ? 'Downloading…' : 'Idle';
      document.getElementById('progress').textContent = d.progress || '0/0';
      document.getElementById('log').textContent = d.log || '—';

      var parts = (d.progress || '0/0').split('/');
      var cur = parseInt(parts[0]) || 0;
      var tot = parseInt(parts[1]) || 0;
      var pct = tot > 0 ? Math.round(cur / tot * 100) : (active ? 40 : 0);
      document.getElementById('pbar').style.width = pct + '%';

      // prefill path if app has one set and input is still empty
      if (d.downloadPath && d.downloadPath !== 'Download Path') {
        var pi = document.getElementById('pathInput');
        if (!pi.dataset.edited) pi.placeholder = d.downloadPath;
      }
    }).catch(function() {
      document.getElementById('statusText').textContent = 'Not reachable';
      document.getElementById('dot').className = 'dot';
    });
  }

  // ── download ───────────────────────────────────────────────────────────────
  document.getElementById('dlBtn').addEventListener('click', function() {
    var url  = document.getElementById('urlInput').value.trim();
    var path = document.getElementById('pathInput').value.trim();
    if (!url) { toast('Paste a YouTube URL first'); return; }
    
    var payload = JSON.stringify({ url: url, path: path });
    console.log('Sending payload:', payload); // debug
    
    fetch('/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) {
            toast('Download started!');
            document.getElementById('urlInput').value = '';
        } else {
            toast('Error: ' + (d.error || 'unknown'));
        }
    })
    .catch(function(e) { toast('Fetch error: ' + e.message); });
});

  document.getElementById('stopBtn').addEventListener('click', function() {
    fetch('/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
    })
    .then(function(r) { return r.json(); })
    .then(function() { toast('Stopped.'); })
    .catch(function(e) { toast('Error: ' + e.message); });
});

  // path input — mark as manually edited so we stop overwriting placeholder
  document.getElementById('pathInput').addEventListener('input', function() {
    this.dataset.edited = '1';
  });

  // ── file list ──────────────────────────────────────────────────────────────
  function loadFiles() {
    apiFetch('/files').then(function(d) {
      var files = d.files || [];
      var countEl = document.getElementById('fileCount');
      countEl.textContent = files.length ? files.length + ' file' + (files.length !== 1 ? 's' : '') : '';

      var list = document.getElementById('fileList');
      if (!files.length) {
        list.innerHTML = '<li class="empty-state">No MP3 files in download folder</li>';
        return;
      }
      list.innerHTML = files.map(function(f) {
        var enc = encodeURIComponent(f.name);
        return '<li class="file-item">'
          + '<span class="file-icon">🎵</span>'
          + '<span class="file-name" title="' + f.name + '">' + f.name + '</span>'
          + '<span class="file-size">' + f.size + ' KB</span>'
          + '<button class="dl-btn" data-file="' + enc + '">⬇</button>'
          + '</li>';
      }).join('');

      // event delegation — one listener on the list
      list.onclick = function(e) {
        var btn = e.target.closest('.dl-btn');
        if (btn) window.location.href = '/files/' + btn.dataset.file;
      };
    }).catch(function() {});
  }

  document.getElementById('zipBtn').addEventListener('click', function() {
    window.location.href = '/files/zip';
  });

  // ── init ───────────────────────────────────────────────────────────────────
  pollStatus();
  loadFiles();
  setInterval(pollStatus, 1500);
  setInterval(loadFiles, 6000);
</script>
</body>
</html>
